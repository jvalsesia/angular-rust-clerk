<div class="dashboard-container">
  <div class="glass-panel fade-in">
    <div class="dashboard-header">
      <div class="user-avatar-wrapper" *ngIf="user()?.imageUrl">
        <img [src]="user()?.imageUrl" alt="User Avatar" class="user-avatar" />
      </div>
      <h1 class="welcome-title">Welcome back, {{ user()?.fullName || 'User' }}!</h1>
      <p class="subtitle">Securely authenticated workspace dashboard</p>
    </div>

    <div class="profile-details-grid">
      <div class="detail-card">
        <span class="detail-label">Full Name</span>
        <span class="detail-value">{{ user()?.fullName || 'N/A' }}</span>
      </div>

      <div class="detail-card">
        <span class="detail-label">Primary Email</span>
        <span class="detail-value">{{ user()?.primaryEmailAddress || 'N/A' }}</span>
      </div>

      <div class="detail-card">
        <span class="detail-label">User ID (Clerk)</span>
        <span class="detail-value mono-text">{{ user()?.id || 'N/A' }}</span>
      </div>

      <div class="detail-card">
        <span class="detail-label">Workspace Status</span>
        <span class="status-badge">
          <span class="status-dot"></span>
          Active Session
        </span>
      </div>
    </div>

    <div class="dashboard-actions">
      <button class="btn-logout" (click)="onSignOut()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logout-icon"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Sign Out
      </button>
    </div>
  </div>
</div>
